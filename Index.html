<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0f0d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Trade Journal</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" defer></script>
</head>
<body>
  <header class="topbar">
    <h1 class="brand">TRADE<span>JOURNAL</span></h1>
    <div class="topbar-actions">
      <button id="installBtn" class="btn-ghost" hidden>Install</button>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-view="trades">Trades</button>
    <button class="tab" data-view="tier">Tier</button>
    <button class="tab" data-view="stats">Stats</button>
    <button class="tab" data-view="manage">Manage</button>
    <button class="tab" data-view="backup">Backup</button>
  </nav>

  <main id="app"></main>

  <button id="fab" class="fab" title="New trade">＋</button>

  <!-- Modal root -->
  <div id="modalRoot"></div>

  <script src="js/db.js"></script>
  <script src="js/trades.js"></script>
  <script src="js/tier.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
